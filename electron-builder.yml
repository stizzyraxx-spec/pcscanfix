appId: com.pcscanfix.app
productName: PCScanFix
copyright: Copyright © 2026 PCScanFix

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - electron.cjs
  - preload.cjs
  - core/**/*.cjs
  - "!src/**/*"
  - "!scripts/**/*"
  - "!node_modules/.cache/**/*"

asar: true

mac:
  category: public.app-category.utilities
  icon: build/icon.png
  darkModeSupport: true
  hardenedRuntime: false
  target:
    - target: dmg
      arch: [x64, arm64]

dmg:
  title: "PCScanFix ${version}"
  background: null
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 180
      type: file
    - x: 410
      y: 180
      type: link
      path: /Applications

win:
  icon: build/icon.png
  target:
    - target: nsis
    - target: portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PCScanFix
  installerIcon: build/icon.png
  uninstallerIcon: build/icon.png
  installerHeaderIcon: build/icon.png

linux:
  icon: build/icon.png
  category: Utility
  target:
    - target: AppImage

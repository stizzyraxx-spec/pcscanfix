appId: com.pcfixscan.app
productName: PCFixScan
copyright: Copyright © 2026 PCFixScan

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - electron.cjs
  - preload.cjs
  - core/**/*.cjs
  - "!src/**/*"
  - "!scripts/**/*"
  - "!api/**/*"
  - "!node_modules/.cache/**/*"

asar: true

# Auto-update target — point this at your distribution host. Default: GitHub Releases.
# Set GH_TOKEN in CI; electron-builder reads `repository` from package.json.
publish:
  - provider: github
    releaseType: release

mac:
  category: public.app-category.utilities
  icon: build/icon.png
  darkModeSupport: true
  # hardenedRuntime + entitlements + notarize → required for distribution
  # outside the App Store. macOS will refuse to launch unsigned apps.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization runs automatically when CSC_LINK + APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD
  # + APPLE_TEAM_ID are present in env. Leave commented until you have a Developer ID.
  # notarize:
  #   teamId: "${env.APPLE_TEAM_ID}"
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  title: "PCFixScan ${version}"
  background: null
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 180
      type: file
    - x: 410
      y: 180
      type: link
      path: /Applications

win:
  icon: build/icon.ico
  # Code-signing: set CSC_LINK (cert .pfx in base64) + CSC_KEY_PASSWORD in env.
  # Without these, Windows SmartScreen flags the installer.
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PCFixScan
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  differentialPackage: true

linux:
  icon: build/icon.png
  category: Utility
  target:
    - target: AppImage
